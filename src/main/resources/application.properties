spring.application.name=oneGasMeter

# ---------------------------------------------------------------------------
# DLMS Inbound Server (contatori che si connettono all'applicazione)
# ---------------------------------------------------------------------------
# Impostare a true per avviare il server TCP in ascolto.
# Se false (o non impostato) il server NON viene creato e nessuna porta viene aperta.
dlms.inbound.enabled=false

# Porta TCP su cui il server resta in ascolto (default IANA DLMS: 4059)
dlms.inbound.port=4059

# Timeout di lettura/scrittura per ogni sessione contatore (millisecondi)
dlms.inbound.session-timeout-ms=30000

# Indirizzo DLMS client (SAP) usato per le sessioni in ingresso (default: 16 = public client)
dlms.inbound.client-address=16

# Indirizzo DLMS server (logical device) usato per le sessioni in ingresso (default: 1)
dlms.inbound.server-address=1

# Livello di autenticazione DLMS: NONE, LOW, HIGH, HIGH_MD5, HIGH_SHA1, HIGH_GMAC
dlms.inbound.authentication=NONE

# Password per autenticazione LOW o HIGH (lasciare vuoto se authentication=NONE)
# dlms.inbound.password=
